<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" role="img" aria-labelledby="title desc">
  <title id="title">semantic-memory-mcp architecture</title>
  <desc id="desc">Agents connect over MCP stdio to runtime tool profiles and semantic-memory. Searchable memory uses SQLite, FTS5, vector and sparse indexes. A separately verified claim ledger derives an in-memory trust index.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#07101f"/><stop offset="1" stop-color="#111827"/></linearGradient>
    <linearGradient id="mcp" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#132b4f"/><stop offset="1" stop-color="#153456"/></linearGradient>
    <linearGradient id="memory" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#123c3b"/><stop offset="1" stop-color="#15324a"/></linearGradient>
    <linearGradient id="trust" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#3b2449"/><stop offset="1" stop-color="#31294d"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity=".3"/></filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0 0l10 5-10 5z" fill="#71d7ff"/></marker>
    <marker id="trustArrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0 0l10 5-10 5z" fill="#d7a8ff"/></marker>
    <style>
      text{font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif;fill:#e8f1ff}.title{font-size:34px;font-weight:750}.subtitle{font-size:15px;fill:#8fa6c4}.h{font-size:21px;font-weight:700}.label{font-size:15px;font-weight:650}.small{font-size:13px;fill:#a9bdd7}.micro{font-size:12px;fill:#8fa6c4}.box{stroke-width:1.5}.flow{fill:none;stroke:#71d7ff;stroke-width:2.4;marker-end:url(#arrow)}.trustflow{fill:none;stroke:#d7a8ff;stroke-width:2.4;marker-end:url(#trustArrow)}.dash{stroke-dasharray:7 7}
    </style>
  </defs>
  <rect width="1440" height="900" rx="26" fill="url(#bg)"/>
  <circle cx="1280" cy="60" r="190" fill="#2354a0" opacity=".08"/><circle cx="85" cy="850" r="260" fill="#18a999" opacity=".06"/>
  <text x="70" y="66" class="title">semantic-memory-mcp</text>
  <text x="70" y="94" class="subtitle">Local-first retrieval, receipts, governed authority, and optional claim-ledger trust</text>

  <g>
    <rect x="70" y="140" width="270" height="270" rx="22" fill="#101d31" stroke="#2d4665" class="box"/>
    <text x="95" y="178" class="h">Agent clients</text>
    <g><rect x="95" y="204" width="220" height="48" rx="12" fill="#172842" stroke="#315172"/><text x="115" y="234" class="label">Hermes Agent</text></g>
    <g><rect x="95" y="267" width="220" height="48" rx="12" fill="#172842" stroke="#315172"/><text x="115" y="297" class="label">Claude Code</text></g>
    <g><rect x="95" y="330" width="220" height="48" rx="12" fill="#172842" stroke="#315172"/><text x="115" y="360" class="label">Codex / MCP clients</text></g>
    <text x="95" y="397" class="micro">Client approvals remain client policy</text>

    <rect x="425" y="132" width="450" height="288" rx="24" fill="url(#mcp)" stroke="#3979a8" class="box"/>
    <text x="453" y="172" class="h">MCP server · rmcp · stdio</text>
    <text x="453" y="197" class="small">Schema discovery and protocol errors over JSON-RPC</text>
    <rect x="453" y="220" width="188" height="72" rx="13" fill="#10243e" stroke="#3b82b8"/>
    <text x="471" y="247" class="label">lean / standard</text><text x="471" y="270" class="small">4 governed read-only tools</text>
    <rect x="659" y="220" width="188" height="72" rx="13" fill="#10243e" stroke="#3b82b8"/>
    <text x="677" y="247" class="label">agent</text><text x="677" y="270" class="small">16 bounded daily tools</text>
    <rect x="453" y="310" width="394" height="78" rx="13" fill="#10243e" stroke="#f1a958"/>
    <text x="471" y="338" class="label">full operator profile</text>
    <text x="471" y="361" class="small">All compiled tools · tools/list is source of truth</text>
    <text x="471" y="381" class="micro">Mutation · admin · maintenance · experimental surfaces</text>

    <rect x="960" y="132" width="410" height="288" rx="24" fill="#131f33" stroke="#3d5575" class="box"/>
    <text x="988" y="172" class="h">Runtime entrypoints</text>
    <rect x="988" y="207" width="354" height="72" rx="13" fill="#172942" stroke="#3c678e"/>
    <text x="1007" y="234" class="label">MemoryBridge</text><text x="1007" y="257" class="small">Candle · Ollama · mock (tests)</text>
    <rect x="988" y="298" width="354" height="90" rx="13" fill="#172942" stroke="#3c678e"/>
    <text x="1007" y="326" class="label">Optional HTTP sidecar</text>
    <text x="1007" y="349" class="small">127.0.0.1 only · not MCP · no profile filter</text>
    <text x="1007" y="371" class="micro">Search, add, integrity, rerank, maintenance routes</text>
  </g>

  <path d="M340 275H425" class="flow"/><text x="355" y="261" class="micro">MCP stdio</text>
  <path d="M875 275H960" class="flow"/>

  <g>
    <rect x="70" y="500" width="805" height="330" rx="24" fill="url(#memory)" stroke="#32a6a0" class="box"/>
    <text x="100" y="542" class="h">semantic-memory · searchable state</text>
    <text x="100" y="568" class="small">Ordinary semantic search continues even if trust enrichment is disabled</text>
    <rect x="100" y="602" width="225" height="104" rx="15" fill="#102e35" stroke="#2ba79e"/>
    <text x="120" y="633" class="label">SQLite · memory.db</text><text x="120" y="658" class="small">facts · chunks · sessions</text><text x="120" y="681" class="small">receipts · FTS5 / BM25</text>
    <rect x="352" y="602" width="225" height="104" rx="15" fill="#102e35" stroke="#2ba79e"/>
    <text x="372" y="633" class="label">Vector candidates</text><text x="372" y="658" class="small">usearch (default)</text><text x="372" y="681" class="small">HNSW optional</text>
    <rect x="604" y="602" width="241" height="104" rx="15" fill="#102e35" stroke="#2ba79e"/>
    <text x="624" y="633" class="label">V36 sparse vectors</text><text x="624" y="658" class="small">SQLite dot-product lane</text><text x="624" y="681" class="small">Default weight 0 · inherited</text>
    <rect x="100" y="733" width="745" height="65" rx="14" fill="#102735" stroke="#34879a"/>
    <text x="120" y="759" class="label">Retrieval + policy</text>
    <text x="120" y="782" class="small">RRF · temporal/provenance · supersession · graph · routing · durable receipts · V35 replay inputs (opt-in)</text>

    <rect x="960" y="500" width="410" height="330" rx="24" fill="url(#trust)" stroke="#a66bd3" class="box"/>
    <text x="988" y="542" class="h">Claim trust · separate authority</text>
    <rect x="988" y="581" width="354" height="66" rx="13" fill="#271d38" stroke="#a66bd3"/>
    <text x="1007" y="607" class="label">Before compaction</text><text x="1007" y="630" class="small">claim_ledger.jsonl · hash-chained</text>
    <rect x="988" y="666" width="354" height="82" rx="13" fill="#271d38" stroke="#a66bd3"/>
    <text x="1007" y="692" class="label">After atomic publication</text>
    <text x="1007" y="715" class="small">verified snapshot + retained tail + receipt</text>
    <text x="1007" y="736" class="micro">Manifest selects one generation</text>
    <rect x="988" y="767" width="354" height="42" rx="12" fill="#352443" stroke="#d7a8ff"/>
    <text x="1007" y="793" class="label">Derived in-memory ClaimTrustIndex</text>
  </g>

  <path d="M1165 420V500" class="flow"/><text x="1179" y="465" class="micro">open / verify</text>
  <path d="M960 788H875" class="trustflow"/><text x="917" y="768" text-anchor="middle" class="micro">enrich witnessed facts</text>
  <path d="M988 614C925 614 925 788 988 788" class="trustflow dash"/>
  <text x="1360" y="858" text-anchor="end" class="micro">Verification failure → disable trust enrichment and ledger writes; never promote derived state</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="940" viewBox="0 0 1500 940" role="img" aria-labelledby="title desc">
  <title id="title">semantic-memory retrieval pipeline</title>
  <desc id="desc">A query selects witnessed retrieval mode, runs BM25, vector, and optional sparse candidate lanes, fuses ranks, applies policy, persists receipts, and returns source-hydrated trust-enriched results.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#07101f"/><stop offset="1" stop-color="#111827"/></linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#12324b"/><stop offset="1" stop-color="#123b49"/></linearGradient>
    <linearGradient id="violet" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#322148"/><stop offset="1" stop-color="#273057"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="7" stdDeviation="10" flood-color="#000" flood-opacity=".3"/></filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0l10 5-10 5z" fill="#6dd5fa"/></marker>
    <marker id="violetArrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0l10 5-10 5z" fill="#d1a6ff"/></marker>
    <style>
      text{font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif;fill:#e9f2ff}.title{font-size:34px;font-weight:750}.subtitle{font-size:15px;fill:#91a8c5}.h{font-size:20px;font-weight:720}.label{font-size:15px;font-weight:650}.small{font-size:13px;fill:#acc0d8}.micro{font-size:12px;fill:#8fa6c4}.flow{fill:none;stroke:#6dd5fa;stroke-width:2.3;marker-end:url(#arrow)}.vflow{fill:none;stroke:#d1a6ff;stroke-width:2.3;marker-end:url(#violetArrow)}.dash{stroke-dasharray:7 7}
    </style>
  </defs>
  <rect width="1500" height="940" rx="26" fill="url(#bg)"/>
  <circle cx="1400" cy="95" r="210" fill="#285eaa" opacity=".07"/><circle cx="70" cy="900" r="250" fill="#16b3a3" opacity=".055"/>
  <text x="65" y="65" class="title">Witnessed retrieval pipeline</text>
  <text x="65" y="93" class="subtitle">Production dense + lexical search, inherited V36 sparse lane, durable evidence, and privacy-aware V35 replay</text>

  <g>
    <rect x="65" y="140" width="220" height="86" rx="18" fill="url(#cyan)" stroke="#3d89af"/>
    <text x="88" y="174" class="h">1 · Query</text><text x="88" y="199" class="small">text · top_k · namespaces</text>
    <rect x="345" y="140" width="280" height="86" rx="18" fill="url(#cyan)" stroke="#3d89af"/>
    <text x="368" y="174" class="h">2 · Retrieval contract</text><text x="368" y="199" class="small">hybrid · fts_only · vector_only</text>
    <rect x="685" y="140" width="350" height="86" rx="18" fill="url(#violet)" stroke="#8d68bb"/>
    <text x="708" y="174" class="h">V35 replay policy</text>
    <text x="708" y="199" class="small">no_replay (default) · store_inputs (explicit opt-in)</text>
    <rect x="1095" y="140" width="340" height="86" rx="18" fill="#18263d" stroke="#476482"/>
    <text x="1118" y="174" class="h">Search context</text><text x="1118" y="199" class="small">current state · bypass cache · request ID</text>
  </g>
  <path d="M285 183H345" class="flow"/><path d="M625 183H685" class="flow"/><path d="M1035 183H1095" class="flow"/>

  <text x="65" y="292" class="h">3 · Candidate generation</text>
  <path d="M1265 226V272H240V326" class="flow"/><path d="M1265 272H750V326" class="flow"/><path d="M1265 272H1260V326" class="flow"/>
  <g>
    <rect x="65" y="326" width="350" height="154" rx="20" fill="#112d3c" stroke="#3194ad"/>
    <text x="90" y="363" class="h">FTS5 / BM25</text><text x="90" y="390" class="small">SQLite lexical ranking</text>
    <rect x="90" y="414" width="300" height="42" rx="10" fill="#0d2333" stroke="#285e78"/><text x="108" y="440" class="small">Always available in hybrid / fts_only</text>

    <rect x="575" y="326" width="350" height="154" rx="20" fill="#112d3c" stroke="#3194ad"/>
    <text x="600" y="363" class="h">Dense vector</text><text x="600" y="390" class="small">Candle or Ollama query embedding</text>
    <rect x="600" y="414" width="300" height="42" rx="10" fill="#0d2333" stroke="#285e78"/><text x="618" y="440" class="small">usearch default · HNSW optional</text>

    <rect x="1085" y="326" width="350" height="154" rx="20" fill="#1d273d" stroke="#8b78b5"/>
    <text x="1110" y="363" class="h">V36 sparse vector</text><text x="1110" y="390" class="small">SQLite sparse dot product</text>
    <rect x="1110" y="414" width="300" height="42" rx="10" fill="#171d32" stroke="#6d5c91"/><text x="1128" y="433" class="micro">Inherited from semantic-memory</text><text x="1128" y="449" class="micro">default sparse_weight = 0</text>
  </g>

  <path d="M240 480V540H670" class="flow"/><path d="M750 480V540H750" class="flow"/><path d="M1260 480V540H830" class="vflow dash"/>
  <g>
    <rect x="500" y="540" width="500" height="104" rx="21" fill="url(#cyan)" stroke="#38a8ad"/>
    <text x="527" y="578" class="h">4 · Reciprocal Rank Fusion</text>
    <text x="527" y="605" class="small">Merge candidate ranks without cross-lane score calibration</text>
    <text x="527" y="626" class="micro">Receipts retain rank and contribution evidence, including sparse ranks when active</text>
  </g>

  <path d="M750 644V692" class="flow"/>
  <g>
    <rect x="65" y="692" width="410" height="132" rx="20" fill="#122d39" stroke="#3593a0"/>
    <text x="90" y="728" class="h">5 · Policy and state</text>
    <text x="90" y="755" class="small">temporal / provenance weighting</text>
    <text x="90" y="778" class="small">current-state and supersession filtering</text>
    <text x="90" y="801" class="small">optional routed / graph stages in full profile</text>

    <rect x="545" y="692" width="410" height="132" rx="20" fill="#122d39" stroke="#3593a0"/>
    <text x="570" y="728" class="h">6 · Witness + receipt</text>
    <text x="570" y="755" class="small">persist durable receipt · verify it exists</text>
    <text x="570" y="778" class="small">hydrate fact row, namespace, and source</text>
    <text x="570" y="801" class="small">omit results without honest source provenance</text>

    <rect x="1025" y="692" width="410" height="132" rx="20" fill="url(#violet)" stroke="#9b72c8"/>
    <text x="1050" y="728" class="h">7 · Trust + authority</text>
    <text x="1050" y="755" class="small">enrich from verified, derived claim index</text>
    <text x="1050" y="778" class="small">attach authority snapshot / stage outcomes</text>
    <text x="1050" y="801" class="small">ledger failure disables enrichment, not search</text>
  </g>
  <path d="M500 592H270V692" class="flow"/><path d="M750 644V692" class="flow"/><path d="M1000 592H1230V692" class="vflow"/>
  <path d="M475 758H545" class="flow"/><path d="M955 758H1025" class="vflow"/>

  <g>
    <rect x="405" y="866" width="690" height="48" rx="14" fill="#15263b" stroke="#4d708e"/>
    <text x="430" y="896" class="label">Ranked witnessed facts + source + trust + state + retrieval receipt reference</text>
  </g>
  <path d="M1230 824V842H750V866" class="flow"/>
  <text x="1110" y="851" class="micro">sm_replay_search uses stored inputs only when opted in</text>
</svg>

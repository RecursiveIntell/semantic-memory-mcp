<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 460" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif">
  <style>
    .bg { fill: #0d1117; }
    .box { fill: #161b22; stroke: #30363d; stroke-width: 1; rx: 6; }
    .box-blue { fill: #0f2438; stroke: #1f6feb; stroke-width: 1; rx: 6; }
    .box-teal { fill: #0f2d2d; stroke: #39d0d8; stroke-width: 1; rx: 6; }
    .box-green { fill: #0f2d18; stroke: #3fb950; stroke-width: 1; rx: 6; }
    .box-orange { fill: #2d2008; stroke: #d29922; stroke-width: 1; rx: 6; }
    .label { fill: #c9d1d9; font-size: 12px; }
    .label-bold { fill: #f0f6fc; font-size: 12px; font-weight: 700; }
    .label-sm { fill: #8b949e; font-size: 10px; }
    .arrow { stroke: #484f58; stroke-width: 1.5; fill: none; }
    .arrow-teal { stroke: #39d0d8; stroke-width: 1.5; fill: none; }
    .arrow-label { fill: #79c0ff; font-size: 10px; text-anchor: middle; }
  </style>

  <rect width="880" height="460" class="bg"/>

  <text x="440" y="25" text-anchor="middle" fill="#f0f6fc" font-size="16px" font-weight="700">Hybrid Search Pipeline: How a Query Flows</text>

  <!-- Step 1: Query input -->
  <rect x="330" y="45" width="220" height="30" class="box-blue"/>
  <text x="440" y="65" text-anchor="middle" class="label-bold" fill="#79c0ff">1. Query arrives (sm_search)</text>

  <path d="M 440 75 L 440 95" class="arrow" marker-end="url(#arr)"/>

  <!-- Step 2: Embedding -->
  <rect x="330" y="95" width="220" height="40" class="box"/>
  <text x="440" y="112" text-anchor="middle" class="label-bold">2. Embed query</text>
  <text x="440" y="127" text-anchor="middle" class="label-sm">Ollama /api/embed → Vec&lt;f32&gt; (768-dim)</text>

  <path d="M 440 135 L 440 150" class="arrow" marker-end="url(#arr)"/>

  <!-- Step 3: Parallel BM25 + Vector -->
  <text x="180" y="165" text-anchor="middle" class="label-sm" font-weight="600">BM25 path</text>
  <text x="700" y="165" text-anchor="middle" class="label-sm" font-weight="600">Vector path</text>

  <!-- BM25 branch arrow -->
  <path d="M 440 150 L 440 160 L 180 160 L 180 175" class="arrow" marker-end="url(#arr)"/>
  <!-- Vector branch arrow -->
  <path d="M 440 150 L 440 160 L 700 160 L 700 175" class="arrow-teal" marker-end="url(#arr)"/>

  <!-- BM25 box -->
  <rect x="80" y="175" width="200" height="55" class="box"/>
  <text x="180" y="193" text-anchor="middle" class="label-bold">3a. FTS5 BM25 search</text>
  <text x="180" y="208" text-anchor="middle" class="label-sm">SQLite MATCH against content</text>
  <text x="180" y="222" text-anchor="middle" class="label-sm">→ ranked by BM25 score</text>

  <!-- Vector box -->
  <rect x="600" y="175" width="200" height="55" class="box-teal"/>
  <text x="700" y="193" text-anchor="middle" class="label-bold" fill="#39d0d8">3b. Vector search</text>
  <text x="700" y="208" text-anchor="middle" class="label-sm">usearch HNSW k-NN</text>
  <text x="700" y="222" text-anchor="middle" class="label-sm">→ ranked by cosine similarity</text>

  <!-- Merge arrows -->
  <path d="M 180 230 L 180 250 L 440 250 L 440 260" class="arrow" marker-end="url(#arr)"/>
  <path d="M 700 230 L 700 250 L 440 250" class="arrow-teal" marker-end="url(#arr)"/>

  <!-- Step 4: RRF -->
  <rect x="300" y="260" width="280" height="40" class="box"/>
  <text x="440" y="278" text-anchor="middle" class="label-bold">4. Reciprocal Rank Fusion</text>
  <text x="440" y="293" text-anchor="middle" class="label-sm">score = 1/(k+bm25_rank) + 1/(k+vec_rank) + recency</text>

  <path d="M 440 300 L 440 315" class="arrow" marker-end="url(#arr)"/>

  <!-- Step 5: Optional routing/decoder -->
  <rect x="200" y="315" width="480" height="40" class="box-green"/>
  <text x="440" y="333" text-anchor="middle" class="label-bold" fill="#3fb950">5. (Optional) Routing → Decoder → Factor Graph</text>
  <text x="440" y="348" text-anchor="middle" class="label-sm">Profile query → activate stages → detect contradictions → refine confidence</text>

  <path d="M 440 355 L 440 370" class="arrow" marker-end="url(#arr)"/>

  <!-- Step 6: Results -->
  <rect x="300" y="370" width="280" height="40" class="box-orange"/>
  <text x="440" y="388" text-anchor="middle" class="label-bold" fill="#d29922">6. Results + Receipt</text>
  <text x="440" y="403" text-anchor="middle" class="label-sm">Vec&lt;SearchResult&gt; + content-addressed receipt</text>

  <path d="M 440 410 L 440 425" class="arrow" marker-end="url(#arr)"/>

  <!-- Output -->
  <rect x="330" y="425" width="220" height="25" class="box-blue"/>
  <text x="440" y="442" text-anchor="middle" class="label-bold" fill="#79c0ff">JSON response to MCP client</text>

  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#484f58"/>
    </marker>
  </defs>
</svg>